<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=1280, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">
    </head>
    <body>
        <h2 id="console"></h2>
        
        <!-- Conteúdo -->
        <div id="conteudo">

            <!-- Fundo -->
            <video id="fundo" src="./media/fundo.mp4" ></video>

            <!-- Dados -->
            <div id="categoria"></div>
            <div id="container"></div>
            
            <!-- Relógio -->
            <div id="hora">00:00:00</div>
            <div id="dt">Data</div>
        </div>

        <!-- Scripts -->
        <script src="../../lib/js/jquery-3.1.1.min.js"></script>
        <script src="../../lib/js/GnLib.js"></script>
        <script>    
            var listaPratos = [];
            //var GnContentFoundBkp = GnContentFound;
            //var GnContentFound = undefined;
			var alimentos = [];
			var duracao = 45;
			
			//var CATEGORIA = "Café da manhã";
			//var CATEGORIA = "Almoço";
			var CATEGORIA = "Lanche da tarde";
            
            $(function () {
                
                //GnPlayer
                if( !GnLib.getParam('preview') ) {
                    var date = new Date();
                    
                    //Carrega o conteúdo
                    var DATA_SOURCE = "/EMPRESAS/alimento.xml";
                    var currentDate = new Date();
                    GnLib.autoloadContent(DATA_SOURCE, function(template) {
						$("#categoria").text(CATEGORIA);
                        for( i in template.registros ) {
							if( template.registros[i].categoria == CATEGORIA ) {
								alimentos.push(template.registros[i]);
							}							
						}
                    });
                } else { //Preview
                   
                    //Autplay
                    $("#abertura").ready(function() {
                        GnPlay();
                    });
                }
            });
            
            
            //Autoplay
            function GnPlay() {
                $("#fundo").get(0).play();
				setTimeout(function() {
					$("#categoria").fadeIn();
				}, 800);
				exibirAlimentos()
            }
			
			// Exibe os alimentos
			var indice = 0;
			function exibirAlimentos() {
				var itensPagina = 14;
				var transicao = duracao / ( alimentos.length / itensPagina );
				var escape = false;
				$("#container").fadeOut(function() {
					$("#container").html("");
					for( i = 0; i < itensPagina; i ++ ) {
					
						if( alimentos[indice] && alimentos[indice] != undefined ) {
							var html = "<div class='alimento'>" + alimentos[indice].nome + "</div>";
							indice ++;
							$("#container").append(html);
						} else {
							$("#container").fadeIn();
							return;
						}
						$("#container").fadeIn();
					}
					
					// Agenda a próxima exibição
					setTimeout(exibirAlimentos, transicao * 1000);
				});
			}
            
            //Autoplay - localhost
            if( window.location.href.indexOf("localhost/html5") > -1 ) {
                setTimeout(function() {
                    GnPlay();
                }, 1000);
            }
          
        </script>
    </body>
</html>
