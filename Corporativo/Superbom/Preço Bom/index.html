    <!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=1280, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">
    </head>
    <body>
        <!-- Conteúdo -->
        <div id="conteudo">
            
            <!-- Fundo -->
            <video id="fundo" src="./media/fundo.mp4"></video>
            <div id="valor">
            <img id="valor" src="./media/valor.png">          
            </div>
            <!-- Imagem -->
            <div id="ctImg" ><img id="fileId" /></div>
            
            <!-- Dados -->
            <div id="dados">
                <div id="nome"></div>
                <div id="validade"></div>
            </div>
            <h1 id="reais2" style="display: none;">R$</h1>
			<div id="ctPreco2">
				<div id="ctPreco">
					<div id="preco"></div>
					<div id="cents"></div>
					<div id="unidade"></div>
				</div>
			</div>
            
            <!-- Calhau-->
            <video id="calhau" src="./media/calhau.mp4" ></video> 
            
        </div>
        
        <!-- Scripts -->
        <script src="../../lib/js/jquery-3.1.1.min.js"></script>
        <script src="../../lib/js/GnLib.js"></script>
        <script>
            if (typeof (GnContentFound) != 'undefined') {
                GnContentFound();
            }
            
            var comImagem = true;
            var ext;
            var possuiConteudo = true;
            var DURATION = 15000;
            $(function () {
                
                //GnPlayer
                if( !GnLib.getParam('preview') ) {
                    
                    //Carrega o conteúdo
                    var DATA_SOURCE = "/EMPRESAS/preco_baixo.xml";
                    GnLib.autoloadContent(DATA_SOURCE, function(tempalte) {
                    });
                    
                } else { //Preview
					GnLib.loadPreview();

					//Autplay
					setTimeout(function() {
						GnPlay();
					}, 1000);
                }
            });
            
            //Autoplay
            function GnPlay() {
                $("#fundo").get(0).play();
                $("#reais2").hide();
                $("#valor").hide();
                $("#ctImg").hide();
                $("#validadefundo").hide();
                
                 if( possuiConteudo ) {
				
					   var params = $("#preco").html().split(",");
                       $("#preco").html(params[0]);
					   $("#cents").html(","+params[1]);
                       var validade = $("#validade").html();
                       $("#validade").html("OFERTAS VÁLIDAS DE " + validade + "");
                    
                    setTimeout(function() {  
                        $("#nome").show();
                        $("#nome").addClass("animated slideInUpFade");
                        $("#validade").show();
                        $("#validade").addClass("animated slideInUpFade");
                        $("#reais2").show();
                        $("#reais2").addClass("animated slideInUpFade")
                        $("#ctPreco").show();
                        $("#unidade").show();
                        $("#ctPreco").addClass("animated slideInUpFade");
                        $("#unidade").addClass("animated slideInUpFade");
                        $("#ctImg").show();
                        $("#fileId").show();
                        $("#fileId").addClass("animated slideInUpFade");
                    }, 2500);

                    setTimeout(function() {  
                        $("#valor").show();
                        $("#valor").addClass("animated slideInUpFade")
                    }, 2600);
                    
                    setTimeout(function() {  
                        $("#ctImg").removeClass();
                        $("#nome").removeClass();
                        $("#reais2").removeClass();
                        $("#valor").removeClass();
                        $("#ctPreco").removeClass();
                        $("#unidade").removeClass();
                        $("#validade").removeClass();
                    }, 5000);
                    setTimeout(function() {  
                        $("#ctImg").addClass("animated slideOutUpFade");
                        $("#nome").addClass("animated slideOutUpFade");
                        $("#reais2").addClass("animated slideOutUpFade");
                        $("#valor").addClass("animated slideOutUpFade");
                        $("#ctPreco").addClass("animated slideOutUpFade");
                        $("#unidade").addClass("animated slideOutUpFade");
                        $("#validade").addClass("animated slideOutUpFade");
                        $("#validadefundo").addClass("animated slideOutUpFade");
                    }, 9800); 
                } else {
                    $("#calhau").show();
                    $("#calhau").get(0).play();
                }
            }
            
            //Autoplay - localhost
            if( window.location.href.indexOf("localhost/html5") > -1 ) {
                setTimeout(function() {
                    GnPlay();
                }, 1000);
            }
            
            //Chama o calhau
            GnLib.dump = function() {
                possuiConteudo = false;
            }
        </script>
    </body>
</html>
