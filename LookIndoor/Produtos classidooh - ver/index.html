<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=1280, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">
    </head>
    <body>
        <h2 id="console"></h2>

        <!-- Conteúdo -->
        <div id="conteudo">
            
            <!-- Fundo  -->
            <video id="fundo" muted ></video>
            <!-- Imagem -->
            <div id="ctImg">
                <img id="fileId" />
            </div>
            
            <!-- Dados -->
            <div id="titulo"></div>
            <div id="descricao"></div>
            <div id="contato"></div>
            

            <!-- Dados 2 -->
            <div id="titulo2"></div>
            <div id="descricao2"></div>
            <div id="contato2"></div>

            <!-- Imagem -->
            <div id="ctImg5">
                <img id="fileId5" />
            </div>
        </div>
         <!-- Calhau -->
         <video id="calhau" muted src="./media/calhau1.mp4" ></video>
            
        <!-- Scripts -->
        <script src="../../lib/js/jquery-3.1.1.min.js"></script>
        <script src="../../lib/js/GnLib.js"></script>
        <script>
            var DATA_SOURCE = "/CONTEUDO/classidooh_produtos/produtos.xml";
            var DURATION = 30000;
            var ext;
            var possuiConteudo = true;
            $("#contato").hide();
            $("#contato2").hide();
            $("#titulo").hide();
            $("#titulo2").hide();
            $("#descricao").hide();
            $("#descricao2").hide();
            $("#ctImg1").hide();
            $("#ctImg5").hide();
            $(function () {
                //GnPlayer
                if (!GnLib.getParam('preview')) {
                    //Carrega o conteúdo
                    GnLib.autoloadContent(DATA_SOURCE, function (template) {
                        
                        //Registro 2
                        var index = GnLib.getIndex(DATA_SOURCE, template.registros);
                        $("#titulo2").html(template.registros[index].titulo);
                        $("#descricao2").html(template.registros[index].descricao);
                        $("#contato2").html(template.registros[index].contato);
                        $("#fileId5").attr("src", GnLib.getContentPath()+"/CONTEUDO/CLASSIDOOH_PRODUTOS/img_"+template.registros[index].fileId+"."+template.registros[index].extId);                        
                        console.log(template.registros[index]);
                        
                    });
                } else { //Preview
                    GnLib.loadPreview();
                    var src = $('#fileId').attr('src');
                    var idx = src.lastIndexOf('.');
                    //src = src.substr(0, idx) + "_656x626" + src.substr(idx)
                    src = src.substr(0, idx) + '.jpg';
                    $('#fileId').attr('src', src);

                    //Autplay
                    setTimeout(function() {
                        GnPlay();
                    }, 1000);
                }
            });

            //Autoplay
            function GnPlay() {

                if( possuiConteudo ) {
                //Carrega o vídeo de fundo
                $("#fundo").attr("src", "./media/fundo.mp4");
			
				//Ajusta o zoom até enquadrar na tela
                //var zoom = window.innerWidth / 768;
                //$("body").css('-moz-transform', "scale("+zoom+","+zoom+")");
                //$("body").css('zoom', zoom);
                

                //Dá play no vídeo de fundo
                $('#fundo').get(0).play();
                
                //Animação
                //$("#ctImg").fadeIn(1000);
                //$("#ctImg2").fadeIn(1000);
                //$("#ctImg3").fadeIn(1000);
                //$("#ctImg4").fadeIn(1000);
                //$("#titulo").fadeIn();
                
                
                setTimeout(function() {$("#titulo").fadeIn(1000)}, 1500);
                setTimeout(function() {$("#descricao").fadeIn(1000)}, 1500);
                setTimeout(function() {$("#contato").fadeIn(1000)}, 1500);
                setTimeout(function() {$("#ctImg").fadeIn(1000)}, 500);
                
                
                setTimeout(function() {$("#titulo2").fadeIn(1000)}, 11000);
                setTimeout(function() {$("#contato2").fadeIn(1000)}, 11000);
                setTimeout(function() {$("#descricao2").fadeIn(1000)}, 11000);
                setTimeout(function() {$("#ctImg5").fadeIn(1000)}, 11000);
                
                
                
                // SAÍDA
                setTimeout(function() {$("#ctImg").fadeOut(1000)}, 10900);
                setTimeout(function() {$("#titulo").fadeOut(1000)}, 10900);
                setTimeout(function() {$("#descricao").fadeOut(1000)}, 10900);
                setTimeout(function() {$("#contato").fadeOut(1000)}, 10900);


                setTimeout(function() {$("#ctImg5").fadeOut(1000)}, 17500);
                setTimeout(function() {$("#titulo2").fadeOut(1000)}, 17500);
                setTimeout(function() {$("#descricao2").fadeOut(1000)}, 17500);
                setTimeout(function() {$("#contato2").fadeOut(1000)}, 17500);

            } else {
                    $("#calhau").show();
                    $("#calhau").get(0).play();
                }
            }
            

            //Autoplay - localhost
            if (window.location.href.indexOf("localhost/html5") > -1) {
                setTimeout(function () {
                    GnPlay();
                }, 1000);
            }

            //Chama o calhau
            GnLib.dump = function() {
                possuiConteudo = false;
            }
        </script>
    </body>
</html>
