<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=1280, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">
    </head>
    <body>
        <h2 id="console"></h2>

        <!-- Conteúdo -->
        <div id="conteudo">
            
            <!-- Fundo  -->
            <video id="fundo" muted ></video>
            
            <!-- Dados -->
            <div id="titulo"></div>
            <div id="nomeEmpresa"></div>
            <div id="descricao"></div>
             <!-- <div id="valor"></div>    -->
            <div id="nivel"></div>
            <div id="contato"></div>


            <!-- Dados 2 -->
            <div id="titulo2"></div>
            <div id="descricao2"></div>
            
            <div id="nomeEmpresa2"></div>
            <div id="nivel2"></div>
            <div id="contato2"></div>

        </div>
         <!-- Calhau -->
         <video id="calhau" muted src="./media/calhau.mp4" ></video>
            
        <!-- Scripts -->
        <script src="../../lib/js/jquery-3.1.1.min.js"></script>
        <script src="../../lib/js/GnLib.js"></script>
        <script>
            var DATA_SOURCE = "/CONTEUDO/EMPREGOS/empregos.xml";
            var DURATION = 30000;
            var ext;
            var possuiConteudo = true;
            $("#titulo").hide();
            $("#titulo2").hide();
            $("#nomeEmpresa").hide();
            $("#nomeEmpresa2").hide();
            $("#descricao").hide();
            $("#descricao2").hide();
            $("#nivel").hide();
            $("#nivel2").hide();
            $("#contato").hide();
            $("#contato2").hide();
            
            $(function () {
                //GnPlayer
                if (!GnLib.getParam('preview')) {
                    //Carrega o conteúdo
                    GnLib.autoloadContent(DATA_SOURCE, function (template) {
                        
                        //Registro 2
                        var index = GnLib.getIndex(DATA_SOURCE, template.registros);
                        $("#titulo2").html(template.registros[index].titulo);
                        $("#descricao2").html(template.registros[index].descricao);
                        $("#nomeEmpresa2").html(template.registros[index].nomeEmpresa);
                        $("#nivel2").html(template.registros[index].nivel);
                        $("#contato2").html(template.registros[index].contato);
                        
                        console.log(template.registros[index]);
                        
                    });
                } else { //Preview
                    GnLib.loadPreview();
                    
                    //Autplay
                    setTimeout(function() {
                        GnPlay();
                    }, 1000);
                }
            });

            //Autoplay
            function GnPlay() {

                if( possuiConteudo ) {
                //Carrega o vídeo de fundo
                $("#fundo").attr("src", "./media/fundo.mp4");
			
				//Ajusta o zoom até enquadrar na tela
                //var zoom = window.innerWidth / 1360;
                //$("body").css('-moz-transform', "scale("+zoom+","+zoom+")");
                //$("body").css('zoom', zoom);
                
                
                //Dá play no vídeo de fundo
                $('#fundo').get(0).play();
                
                //Animação
                
                
                setTimeout(function() {$("#nomeEmpresa").fadeIn(1000)}, 4500);
                setTimeout(function() {$("#titulo").fadeIn(1000)}, 4500);
                setTimeout(function() {$("#nivel").fadeIn(1000)}, 4500);
                
                setTimeout(function() {$("#descricao").fadeIn(1000)}, 4500);
                setTimeout(function() {$("#contato").fadeIn(1000)}, 4500);
                
                setTimeout(function() {$("#titulo2").fadeIn(1000)}, 15500);
                setTimeout(function() {$("#nomeEmpresa2").fadeIn(1000)}, 15500);
                setTimeout(function() {$("#contato2").fadeIn(1000)}, 15500);
                setTimeout(function() {$("#descricao2").fadeIn(1000)}, 15500);
                setTimeout(function() {$("#nivel2").fadeIn(1000)}, 15500);
                
                
                
                // SAÍDA
                setTimeout(function() {$("#titulo").fadeOut(1000)}, 15000);
                setTimeout(function() {$("#nomeEmpresa").fadeOut(1000)}, 15000);
                setTimeout(function() {$("#descricao").fadeOut(1000)}, 15000);
                setTimeout(function() {$("#nivel").fadeOut(1000)}, 15000);
                setTimeout(function() {$("#contato").fadeOut(1000)}, 15000);

                //setTimeout(function() {$("#ctImg5").fadeOut()}, 20000);
                //setTimeout(function() {$("#ctImg6").fadeOut()}, 20000);
                //setTimeout(function() {$("#ctImg7").fadeOut()}, 20000);
                //setTimeout(function() {$("#ctImg8").fadeOut()}, 20000);
                //setTimeout(function() {$("#titulo2").fadeOut()}, 20000);
                //setTimeout(function() {$("#descricaoadicional2").fadeOut()}, 20000);
                //setTimeout(function() {$("#descricao2").fadeOut()}, 20000);
                //setTimeout(function() {$("#ctPreco2").fadeOut()}, 20000);
                //setTimeout(function() {$("#tipo2").fadeOut()}, 20000);
                //setTimeout(function() {$("#retangulo").fadeOut()}, 20000);
            } else {
                    $("#calhau").show();
                    $("#calhau").get(0).play();
                }
            }
            

            //Autoplay - localhost
            if (window.location.href.indexOf("localhost/html5") > -1) {
                setTimeout(function () {
                    GnPlay();
                }, 1000);
            }

            //Chama o calhau
            GnLib.dump = function() {
                possuiConteudo = false;
            }
        </script>
    </body>
</html>
