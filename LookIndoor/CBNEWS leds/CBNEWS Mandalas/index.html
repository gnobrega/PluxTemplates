<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=90, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">
    </head>
    <body>
        <h2 id="console"></h2>
        <!-- Conteúdo -->
        <div id="conteudo">
            
            <img  src="./media/circulo.png" width="90" style="position: absolute; z-index: 100;" height="92" />
            
            <!-- Barra -->
            <div class="cb" id="bar"  style="font-size:10px;">
                <div class="cb1" id="bar1" style="font-size:10px;" >CORREIO</div>
            </div>
            <div class="cb" id="braziliense"  style="font-size:10px; width:70px; height: 35px; position: absolute;">BRAZILIENSE</div>
            <!-- Dados -->
            <!-- <div class="cb" id="fundo"  style="background-color: #011b3e; width:90px; height: 62px; position: absolute;"></div> -->
            <div >
                <div class=shape ></div>
                <div class=shape id="titulo" hidden style="text-align: initial; line-height: 7px; margin-left: 4px; font-size: 8px; margin-top: 32px; margin-right: 5px; color: #90B2FF;"></div>
                <div class=shape id="texto" hidden style="margin-top: 5px;font-size: 6px; margin-left: 5px; margin-right: 6px;"></div>
                
              </div>
            <div class="hidden" id="credito" hidden></div>
        </div>

        <!-- Scripts -->
        <script src="../../lib/js/jquery-3.1.1.min.js"></script>
        <script src="../../lib/js/GnLib.js"></script>
        <script>
            var DATA_SOURCE = "/CONTEUDO/CBNEWS/cbnews.xml";
            var DURATION = 15000;
            var ext;
            
            $(function () {

                //GnPlayer
                if (!GnLib.getParam('preview')) {

                    //Carrega o conteúdo
                    GnLib.autoloadContent(DATA_SOURCE, function (template) {
                        ext = $("#fileId").attr("src").substr(-3);
                        if (ext == "mp4") {
                            $("img#fileId").hide();
                            $("video#midiaVideo").show();
                            $("video#midiaVideo").attr("src", $("#fileId").attr("src"));
                            $("video#midiaVideo").get(0).play();
                        }
                    });

                } else { //Preview

                    //Autplay
                    GnPlay();
                }
            });

            //Autoplay
            function GnPlay() {
                var divTexto = $('#texto');
                var tamanho = $('#texto').text().length
                var divTitulo = $('#titulo');
                var tamanhoTitulo = $('#titulo').text().length
                if (tamanhoTitulo > 15){
                    if (tamanho > 69){
                        divTexto.text(divTexto.text().substring(0,69) + '...')
                    }
                }
                if (tamanho > 87 && tamanhoTitulo < 15){
                    divTexto.text(divTexto.text().substring(0,87) + '[...]')
                }
                setTimeout(function() {  
                    $('#titulo').fadeIn();
                    $('#texto').fadeIn();
                    }, 100);
            }

            //Autoplay - localhost
            if (window.location.href.indexOf("localhost/html5") > -1) {
                setTimeout(function () {
                    GnPlay();
                }, 1000);
            }

        </script>
    </body>
</html>
