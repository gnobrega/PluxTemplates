<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=1280, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">
    </head>
    <body>
        <h2 id="console"></h2>

        <!-- Conteúdo -->
        <div id="conteudo">

            <!-- Imagem -->
            <img id="fileId" class="fileId cena1" />
            <img id="fileId2" class="fileId cena2" />
            <img id="fileId3" class="fileId cena3" />

            <!-- Video -->
            <video id="midiaVideo" autoplay ></video>

            <!-- Barra -->
            <img id="bar" src="./media/bar.png" />

            <!-- Dados -->
            <div id="titulo" class="titulo cena1"></div>
            <div id="texto" class="texto cena1"></div>
            <div id="credito" class="credito cena1"></div>
            
            <div id="titulo2" class="titulo cena2"></div>
            <div id="texto2" class="texto cena2"></div>
            <div id="credito2" class="credito cena2"></div>
            
            <div id="titulo3" class="titulo cena3"></div>
            <div id="texto3" class="texto cena3"></div>
            <div id="credito3" class="credito cena3"></div>

        </div>
        <div id="abertura"></div>
        <div id="fechamento"></div>
        <div id="transicao"></div>

        <!-- Scripts -->
        <script src="../../lib/js/jquery-3.1.1.min.js"></script>
        <script src="../../lib/js/GnLib.js"></script>
        <script>
            var DATA_SOURCE = "/CONTEUDO/CBNEWS/cbnews.xml";
            var DURATION = 15000;
            var ext;

            $(function () {

                //GnPlayer
                if (!GnLib.getParam('preview')) {

                    //Carrega o conteúdo
                    GnLib.autoloadContent(DATA_SOURCE, function (template) {
                        console.log(template);
                        ext = $("#fileId").attr("src").substr(-3);
                        if (ext == "mp4") {
                            $("img#fileId").hide();
                            $("video#midiaVideo").show();
                            $("video#midiaVideo").attr("src", $("#fileId").attr("src"));
                            $("video#midiaVideo").get(0).play();
                        }
                        
                        //Registro 2
                        var index = GnLib.getIndex(DATA_SOURCE, template.registros);
                        $("#titulo2").html(template.registros[index].titulo);
                        $("#credito2").html(template.registros[index].credito);
                        $("#texto2").html(template.registros[index].texto);
                        $("#fileId2").attr("src", GnLib.getContentPath()+"/CONTEUDO/CBNEWS/img_"+template.registros[index].fileId+"."+template.registros[index].extId);
                        console.log(template.registros[index]);
                        
                        
                        //Registro 3
                        index = GnLib.getIndex(DATA_SOURCE, template.registros);
                        $("#titulo3").html(template.registros[index].titulo);
                        $("#credito3").html(template.registros[index].credito);
                        $("#texto3").html(template.registros[index].texto);
                        $("#fileId3").attr("src", GnLib.getContentPath()+"/CONTEUDO/CBNEWS/img_"+template.registros[index].fileId+"."+template.registros[index].extId);
                    });

                } else { //Preview

                    //Autplay
                    GnPlay();
                }
            });
            
            function transicao(i) {
                var j = 2;
                if( i == 2 ) {
                    j = 3;
                }

                $("#transicao").removeClass("fechar-abertura");
                $("#abertura").removeClass("fechar-abertura2");
                setTimeout(function() {
                    $("#transicao").addClass("fechar-abertura");
                    if( i < 9 ) {
                        $(".cena"+i).fadeOut(function() {
                            $(".cena"+j).fadeIn();
                        });
                    } else {
                        $("#fechamento").css("opacity", 1);
                        $("#fechamento").addClass("voltar-abertura2");
                    }
                }, 1000);
            }

            //Autoplay
            function GnPlay() {
                
                //Ajusta o zoom até enquadrar na tela
                var zoom = window.innerWidth / 1360;
                $("body").css('-moz-transform', "scale(" + zoom + "," + zoom + ")");
                $("body").css('zoom', zoom);
                
                //Animação abertura
                $("#abertura").css("opacity", 1);
                setTimeout(function() {
                    $("#abertura").css("opacity", 0);
                    $("#transicao").addClass("fechar-abertura");
                    $("#abertura").addClass("fechar-abertura2");
                    setTimeout(transicao, 8000, 1);
                    setTimeout(transicao, 16000, 2);
                    setTimeout(transicao, 24000, 9);
                }, 3000);
                
            }

            //Autoplay - localhost
            if (window.location.href.indexOf("localhost/html5") > -1) {
                setTimeout(function () {
                    GnPlay();
                }, 1000);
            }

        </script>
    </body>
</html>
