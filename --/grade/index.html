<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=1280, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">
    </head>
    <body>
        <h2 id="console"></h2>

        <!-- Conteúdo -->
        <div id="conteudo">

            <!-- Fundo da grade -->
            <video id="fundo-grade" muted autoplay src="./media/fundo1.mp4" ></video>
            <div id="data"></div>
            <div id="hora"></div>

            <!-- Aulas -->
            <div id="horarios">
                <div id="horario1" class="horario linha1"></div>
                <div id="horario2" class="horario linha2"></div>
                <div id="horario3" class="horario linha3"></div>
                <div id="horario4" class="horario linha4"></div>
                <div id="horario5" class="horario linha5"></div>
                <div id="horario6" class="horario linha6"></div>
            </div>

            <!-- Aulas -->
            <div id="aulas"></div>

        </div>

        <!-- Scripts -->
        <script src="../../lib/js/jquery-3.1.1.min.js"></script>
        <script src="../../lib/js/GnLib.js"></script>
        <script>

            var DATA_SOURCE = "/cliente/grade/data.xml";
            var jsonFile = "../../../data.json";
            $(function () {
        
                // Monta os campos
                for (i = 1; i <= 3; i++) {
                    for (j = 1; j <= 6; j++) {
                        var aulaHtml = $("<div class='campo campo" + i + " linha" + j + "'></div>");
                        $("#aulas").append(aulaHtml);
                    }
                }
        
                // GnPlayer
                if (!GnLib.getParam('preview')) {
        
                    // Carrega o conteúdo
                    loadData(DATA_SOURCE);
                    
                } else { // Preview
                    
                    // Autoplay
                    $("#abertura").ready(function () {
                        GnPlay();
                    });
                }
            });
        
            // Autoplay
            function GnPlay() {
            }
        
            // Autoplay - localhost
            if (window.location.href.indexOf("localhost/html5") > -1) {
                jsonFile = "http://localhost/gncontent/data.json";
                setTimeout(function () {
                    GnPlay();
                }, 1000);
            }
        
            // Relógio
            function atualizarRelogio() {
                var date = new Date();
                var hour = date.getHours();
                var min = date.getMinutes();
                var sec = date.getSeconds();
                if (hour < 10) {
                    hour = "0" + hour;
                }
                if (min < 10) {
                    min = "0" + min;
                }
                if (sec < 10) {
                    sec = "0" + sec;
                }
                $("#hora").html(hour + ":" + min + ":" + sec);
            }
            atualizarRelogio();
            setInterval(atualizarRelogio, 200);
        
            // Preenche a data
            var date = new Date();
            var meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            var dia = date.getDate();
            var mes = date.getMonth();
            if (dia < 10) {
                dia = "0" + dia;
            }
            var hoje = dia + " de " + meses[mes] + " de " + date.getFullYear();
            $("#data").html(hoje);
        
            var aulas;
            var dias_semana = ['domingo', 'segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado'];
            var itensHoje = new Array();
            var arrAtivAtual = new Array(); // Array com as atividades que estão em andamento

            // Carrega os dados 
            function loadData(source) {
                var url = GnLib.getContentPath() + DATA_SOURCE + "?nocache=" + Math.random();
                var dataResponse = null;
                $.ajax({
                    url: jsonFile,
                    type: "POST",
                    dataType: "json",
                    async: false,
                    success: function(response) {
                        dataResponse = response;
                    }
                });
                
                console.log(dataResponse.player.display.id);
                $.ajax({
                    url: url,
                    type: 'GET',
                    success: function (data) {
                        $(".aula").html("");
                        
                        // Conteúdo encontrado
                        if (typeof (GnContentFound) != 'undefined') {
                            GnContentFound();
                        }

                        itensHoje = []; // zera o array a cada carga
                        arrAtivAtual = [];
                        
                        // Extrai os itens
                        var date = new Date();
                        var day = date.getDay();
                        var aulas = $(data).find("item");

                        // Função para converter horário em minutos
                        function getMinutes(horario) {
                            var h = parseInt(horario.substr(0, 2), 10);
                            var m = parseInt(horario.substr(3, 2), 10);
                            return h * 60 + m;
                        }
                        var idDisplayAtual = dataResponse.player.display.id;
                        // Seleciona apenas as aulas do dia e que ainda não terminaram
                        aulas.each(function () {
                            var item = $(this);

                            var nome = item.find("aula").text();
                            var inicio = item.find("inicio").text();
                            var fim = item.find("fim").text();
                            var sala = item.find("sala").text();
                            var professor = item.find("professor").text();
                            var dias = item.find("dias").text();
                            var displays = item.find("displays").text();

                            var arrayDia = dias.split("");
                            var dataAgora = new Date();

                            var agoraMinutos = dataAgora.getHours() * 60 + dataAgora.getMinutes();
                            var fimMinutos = getMinutes(fim);

                            // Verifica se o id do display atual está dentro da lista de displays
                            var displaysArray = displays.split(',').map(function (id) {
                                return id.trim(); // remove espaços
                            });
                            var idEstaNaLista = displaysArray.includes(idDisplayAtual);

                            if (idEstaNaLista && arrayDia[dataAgora.getDay()] == "1" && agoraMinutos < fimMinutos) {
                                var aulaObj = {};
                                aulaObj.nome = nome;
                                aulaObj.professor = professor;
                                aulaObj.sala = sala;
                                aulaObj.inicio = inicio.substr(0, 5);
                                aulaObj.fim = fim.substr(0, 5);
                                aulaObj.dias = dias;
                                aulaObj.horaNumeric = parseInt(limpaHorario(inicio));
                                itensHoje.push(aulaObj);
                            }
                        });

                        // Ordena a lista pelo horário de início
                        itensHoje.sort((a, b) => (a.horaNumeric > b.horaNumeric) ? 1 : ((b.horaNumeric > a.horaNumeric) ? -1 : 0));

                        var totalAtividades = itensHoje.length;
                        var firstAtiv = 999;
                        var lastAtiv = 0;

                        /******** PREENCHE OS CAMPOS ******/

                        // Limpa todas as linhas antes de preencher
                        for (var linha = 1; linha <= 6; linha++) {
                            $("#horario" + linha).html("");
                            $("div.campo1.linha" + linha).html("");
                            $("div.campo2.linha" + linha).html("");
                            $("div.campo3.linha" + linha).html("");
                        }

                        // Preenche até 6 aulas, diretamente de itensHoje
                        for (var i = 0; i < itensHoje.length && i < 6; i++) {
                            (function(index) {
                                var aula = itensHoje[index];
                                var linha = index + 1;

                                setTimeout(function() {
                                    $("#horario" + linha).hide().html(aula.inicio).fadeIn(1000);
                                    $("div.campo1.linha" + linha).hide().html(aula.nome).fadeIn(1000);
                                    $("div.campo2.linha" + linha).hide().html(aula.sala).fadeIn(1000);
                                    $("div.campo3.linha" + linha).hide().html(aula.professor).fadeIn(1000);
                                }, index * 500);
                            })(i);
                        }
                    }
                });
            }

        
            // Ordena o array
            function compare(a, b) {
                if (a.last_nom < b.horaNumeric)
                    return -1;
                if (a.last_nom > b.horaNumeric)
                    return 1;
                return 0;
            }
        
            function limpaHorario(hora) {
                return hora.substr(0, 2) + hora.substr(3, 2);
            }
        
            function formataHorario(hora) {
                hora = hora + "";
                if (hora.length < 4) {
                    hora = "0" + hora.substr(0, 1) + ":" + hora.substr(1, 2);
                } else {
                    hora = hora.substr(0, 2) + ":" + hora.substr(2, 3);
                }
                return hora;
            }
        
        </script>
        
    </body>
</html>
