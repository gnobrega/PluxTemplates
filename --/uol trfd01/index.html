<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=202, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">

    <body>

            var DURATION = 15000;
            var ext;
            GnLib.prefixImg = "";
            //GnLib.filter = {'editoria':'Esporte'};

            $(function () {

                //GnPlayer
                if (!GnLib.getParam('preview')) {

                    //Carrega o conteúdo
                    GnLib.autoloadContent(DATA_SOURCE, function (template) {
                    });

                } else { //Preview

                    //Autplay
                    GnPlay();
                }

                // Autoplay Android
                if( navigator.userAgent.toLowerCase().indexOf("android") > -1) {
                    GnPlay();
                }
            });

				//Zoom
				if (!GnLib.getParam('preview')) {
					
					//Ajusta o zoom até enquadrar na tela
					//var zoom = window.innerWidth / 768;
						
					//Recupera o tamanho do iframe
					//var arrFrames = parent.document.getElementsByTagName("IFRAME");

					//	if( arrFrames[i].contentWindow === window ) {

					//	}
					//}
					
					//if (navigator.userAgent.toLowerCase().indexOf('chrome') == -1) {
					//	$("body").css("-moz-transform", "scale(" + zoom + "," + zoom + ")");
					//	$("body").css("-moz-transform-origin", "0 0");
					//} else {
					//	$("body").css("transform", "scale(" + zoom + ")");

					//}
				}
				
                //Animação
                $("#barra").show();
                $("#logo").show();
                //$("#logo").addClass("zoomIn");

					//$("#editoria").show();
					//$("#editoria").addClass("fadeIn");
					$("#credito").show();
					$("#ctImg").show();
				}, 0);
                
                setTimeout(function() {
                    $("#texto").show();
                    //$("#texto").addClass("fadeIn");    
                }, 0);
            }

            //Autoplay - localhost
            if (window.location.href.indexOf("localhost/html5") > -1) {
                setTimeout(function () {

			//Envia pings ao player para manter a atividade
            setInterval(function() {

                    parent.callApplication({msg:"Youtube - PING"});
