<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=768, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">
    </head>
    <body>
        <h2 id="console" style="position:absolute;top:10px;left:10px;color:red;font-size:50px;z-index:10"></h2>

        <!-- Fundo -->
        <img id="fundo" src="./media/fundo.jpg"></img>

        <!-- Abertura Android 
        <img class="abertura" src="./media/abertura.jpg" /> -->

        <!-- EUA -->
        <img id="eua" src="./media/eua.jpg"></img>

        <!-- UE -->
        <img id="ue" src="./media/ue.jpg"></img>

        <!-- ARG -->
        <img id="arg" src="./media/argentina.jpg"></img>

        <div id="transparencia"></div>
        <!-- Conteúdo -->
        <div id="conteudo">
            <div id="titulos">
                <div class="titulo">Dólar</div>
                <div class="titulo">Euro</div>
                <div class="titulo">Peso</div>
            </div>
            <div id="valores">
                <div id="dolar" class="valor">R$0,00</div>
                <div id="euro" class="valor">R$0,00</div>
                <div id="peso" class="valor">R$0,00</div>
            </div>
            <div id="variacoes">
                <div id="dolar_variacao" class="variacao">00%</div>
                <div id="euro_variacao" class="variacao">00%</div>
                <div id="peso_variacao" class="variacao">00%</div>
            </div>
        </div>

        <div id="blackout"></div>

        <!-- Scripts -->
        <script src="../../lib/js/jquery-3.1.1.min.js"></script>
        <script src="../../lib/js/GnLib.js"></script>
        <script>
            var DATA_SOURCE = "/gn/gn_cotacao/data.xml";
            var DURATION = 15000;
            var ext;
            $("#eua").hide();
            $("#ue").hide();
            $("#arg").hide();
            $("#fundo").hide();
            GnLib.prefixImg = "";
           
            $(function () {

                //GnPlayer
                if (!GnLib.getParam('preview')) {

                    //Carrega o conteúdo
                    GnLib.autoloadContent(DATA_SOURCE, function (template) {
                    });

                } else { //Preview
					GnLib.loadPreviewGn();
					
                    //Autplay
					setTimeout(function() {
						GnPlay();
					}, 1000);
                }

                // Autoplay Android
                if( navigator.userAgent.toLowerCase().indexOf("android") > -1) {
                    GnPlay();
                }
            });

            //Autoplay
            function GnPlay() {

				//Ajusta o zoom até enquadrar na tela
                var zoom = $(window).width() / 768;
                $("body").css("transform-origin", "0 0");
                $("body").css('zoom', zoom);
				if( navigator.userAgent.toLowerCase().indexOf('chrome') == -1 ) {
					$("body").css("-moz-transform", "scale("+zoom+","+zoom+")");
					$("body").css("-moz-transform-origin", "0 0");				
				}
				
				

                // Remove o blackout
                $("#blackout").fadeOut();

                // Abertura
                if( navigator.userAgent.toLowerCase().indexOf("android") > -1) {
                    //$("video#fundo").hide();
                    //$("img.abertura").show();
                } else {
                    //$("video#fundo").get(0).play();
                }
		
                // Variação - Layout
				setTimeout(function () {
					$(".variacao").each(function() {
						if( $(this).text().indexOf("-") > - 1 ) {
							$(this).addClass("down");
						} else {
							$(this).addClass("up");
						}
					});
                }, 1500);
                
                setTimeout(function () {
                    $("#eua").fadeIn();
                    $("#ue").fadeIn();
                    $("#arg").fadeIn();
                    $("#fundo").fadeIn();
                }, 0);
                setTimeout(function () {
                    $(".titulo").eq(0).fadeIn(1000);
                    $(".valor").eq(0).fadeIn(1000);
                    $(".variacao").eq(0).fadeIn(1000);
                }, 2000);
                setTimeout(function () {
                    $(".titulo").eq(1).fadeIn(1000);
                    $(".valor").eq(1).fadeIn(1000);
                    $(".variacao").eq(1).fadeIn(1000);
                }, 2500);
                setTimeout(function () {
                    $(".titulo").eq(2).fadeIn(1000);
                    $(".valor").eq(2).fadeIn(1000);
                    $(".variacao").eq(2).fadeIn(1000);
                }, 3000);
            }

            //Autoplay - localhost
            if (window.location.href.indexOf("localhost/html5") > -1) {
                setTimeout(function () {
                    GnPlay();
                }, 1000);
            }

        </script>
    </body>
</html>
