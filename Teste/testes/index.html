<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"  />
        <meta name="viewport" content="width=1280, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="../../lib/css/animate.css">
    </head>
    <body>
        
        
        <h2 id="console"></h2>
        <div id="content">
            <!-- Fundo -->
            <img id="fundo1" src="./media/fundo1.jpg" autoplay height="97px" width="194px" ></img>
            <div id="hora"></div>
            <div id="diaMes"></div>
            <div id="hora2"></div>
            <div id="diaMes2"></div>
                
            <div id="tempo">
                <!-- Tempo agora Temperatura -->
                <div id="zona2" class="zona">
                    <span class="txtTmp val"></span>
                </div>
                <!-- Tempo agora Temperatura -->
                <div id="zona3" class="zona">
                    <span class="txtTmp val"></span>
                </div>
                <div id="video1">
                    <video name="video" id="video" style="left: -2px; position: absolute;" src="./media/vidoe.mp4" height="100px" width="200px" >
                    </video>
                </div>
            </div>
        </div>

        <!-- Scripts -->
        <script src="../../lib/js/jquery-3.1.1.min.js"></script>
        <script src="../../lib/js/GnLib.js"></script>
        <script>
            var DATA_SOURCE = "/previsao/data.json";
            var DURATION = 15000;
            
            
            //Dá o Ok sobre o carregamento com sucesso
            if (typeof (GnContentFound) != 'undefined') {
                GnContentFound();
            }
            
            // Autoplay Android
            if( navigator.userAgent.toLowerCase().indexOf("android") > -1) {
                    GnPlay();
                }

            function GnPlay() {
            $("#tempo").hide();
            $("#hora").hide();
            $("#diaMes").hide();
            $("#video1").hide();
            var video = document.getElementById("video"); // Seleciona o elemento de vídeo
                
            
            // Após 15 segundos, dá play no video 01
            setTimeout(function() {
                $("#video1").show();
                video.currentTime = 0;
                video.play();
            }, 15000);
            // Após 16 segundos, exclui a imagem do relógio
            setTimeout(function() {
                $("#fundo1").hide();
            }, 16000);

            //Após 30 segundos, mostra o relógio
            setTimeout(function() {
                $("#fundo1").show();
            }, 30000);
            // Após 31 segundos, esconde o vídeo
            setTimeout(function() {
                $("#video1").hide();
                video.currentTime = 0;
                video.pause();
            }, 31000);

            setTimeout(function() {
                $("#video1").show();
                video.play(); // Dá play no vídeo
            }, 45000);
            setTimeout(function() {
                $("#fundo1").hide();
            }, 46000);

            setTimeout(function() {
                $("#fundo1").show();
            }, 60000);
            setTimeout(function() {
                $("#video1").hide();
                video.currentTime = 0;
                video.pause();
            }, 61000);


            //Recupera a hora
            autoloadFooter();
            
            //Carrega o rodapé
            function autoloadFooter() {
                
                //Atualiza o relógio
                updateTime();
                setInterval(updateTime, 200);
                
                //Carrega os dados
                loadWeatherData();
                
            }
            
            //Atualiza o relógio
            function updateTime () {
                var MESES = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
                var d = new Date();
                var horas = d.getHours();
                var minutos = d.getMinutes();
                var dia = d.getDate();
                var mes = d.getMonth();
                var mesExtenso = MESES[mes];
                var ano = d.getFullYear();
                if (horas < 10) {
                    horas = "0" + horas;
                }
                if (minutos < 10) {
                    minutos = "0" + minutos;
                }
                if (dia < 10) {
                    dia = "0" + dia;
                }
                $("#hora").html(horas + ":" + minutos);
                $("#diaMes").html(dia + " de " + mesExtenso);
                $("#hora2").html(horas + ":" + minutos);
                $("#diaMes2").html(dia + " de " + mesExtenso);
            }
            

            // Função para buscar e exibir a temperatura
            function loadWeatherData() {
                $.ajax({
                url: "https://api.weatherapi.com/v1/current.json?key=478a5f138ea749a88b4192625241411&q=Brasilia&lang=pt",
                type: "GET",
                dataType: "json",
                success: function(data) {
                    // Converte para inteiro (removendo a parte decimal)
                    var temperatura = parseInt(data.current.temp_c);
                    console.log("Temperatura:", temperatura);
                    $("#zona2").html(temperatura + "ºC");
                    $("#zona3").html(temperatura + "ºC");
                },
                error: function(xhr, status, error) {
                    console.log("Erro ao carregar dados da API:", error);
                }
            });


            }

                setTimeout(function() {
                    $("#tempo").show();
                    $("#tempo").addClass('animated fadeIn');
                    $("#diaMes").show();
                    $("#diaMes").addClass('animated fadeIn');
                }, 0);
                setTimeout(function() {
                    $("#hora").show();
                    $("#hora").addClass('animated fadeIn');
                }, 0);
            }
            if( window.location.href.indexOf("localhost/html5") > -1 ) {
                setTimeout(function() {
                    GnPlay();
                }, 1000);
            }
            //Envia pings ao player para manter a atividade
            setInterval(function() {
                if( typeof(parent.callApplication) != 'undefined' ) {
                    parent.callApplication({msg:"Youtube - PING"});
                }
            }, 60000);
        </script>
    </body>
</html>
