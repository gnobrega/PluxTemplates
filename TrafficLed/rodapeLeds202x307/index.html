            window.onload = function () {
                setTimeout(function () {
                    if (window.frameElement) {
                        var larguraIframe = window.frameElement.offsetWidth; // use offsetWidth
                        var id = "content" + larguraIframe;

                        document.querySelectorAll(".contentDiv").forEach(div => {
                            div.style.display = "none";
                        });

                        var target = document.getElementById(id);
                        if (target) {
                            target.style.display = "block";
                        } else {
                            console.warn("Sem content para largura: " + larguraIframe);
                        }
                    }
                }, 100); // pequeno delay para garantir que tudo carregou
            };


            //Recupera a hora
            autoloadFooter();
            
            //Carrega o rodapé
            function autoloadFooter() {
                
                //Atualiza o relógio
                updateTime();
                setInterval(updateTime, 200);
                
                //Carrega os dados
                loadData();
                
                
            }
            
            //Atualiza o relógio
            function updateTime () {
                var MESES = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
                var d = new Date();
                var horas = d.getHours();
                var minutos = d.getMinutes();
                        var segundos = d.getSeconds();
                var dia = d.getDate();
                var mes = d.getMonth();
                var ano = d.getFullYear().toString().substr(-2);
                var mesExtenso = MESES[mes];
                var mes1 = ("0" + (mes + 1)).slice(-2)
                if (horas < 10) {
                    horas = "0" + horas;
                }
                if (minutos < 10) {
                    minutos = "0" + minutos;
                }
                        if (segundos < 10) {
                    segundos = "0" + segundos;
                }
                if (dia < 10) {
                    dia = "0" + dia;
                }
                var horaFormatada = horas + ":" + minutos;
                var dataFormatada = dia + "/" + mes1 + "/" + ano;
                $("#hora").html(horaFormatada);
                $("#hora2").html(horaFormatada);
                $("#hora3").html(horaFormatada);
                $("#hora4").html(horaFormatada);
                $("#hora5").html(horaFormatada);
                $("#data").html(dataFormatada);
                $("#data2").html(dataFormatada);
                $("#data3").html(dataFormatada);
                $("#data4").html(dataFormatada);
                $("#data5").html(dataFormatada);
            }
            
            //Carrega os dados
            function loadData() {
                var url = GnLib.getContentPath() + DATA_SOURCE + "?nocache=" + Math.random();
                $.ajax({
                    url: url,
                    type: 'GET',
                    success: function (data) {
                        var hmid = $(data).find('cc').find('hmid').text();
                        var tmp = $(data).find('cc').find('tmp').text();
                        var max1 = $(data).find("dayf day").eq(0).find('hi').text();
                        var min1 = $(data).find("dayf day").eq(0).find('low').text();
                        var chuv1 = $(data).find("dayf day").eq(0).find('ppcp').eq(0).text();
                        var chuv2 = $(data).find("dayf day").eq(1).find('ppcp').eq(0).text();
                        var max2 = $(data).find("dayf day").eq(1).find('hi').text();
                        var min2 = $(data).find("dayf day").eq(1).find('low').text();

                        //$("#zona1 .txtUmid").html("UR " + hmid + "%");
                        $("#zona1 .txtTmp").html(tmp + "º");
                        $("#zona2 .max").html(max1 + "º");
                        $("#zona2 .min").html(min1 + "º");
                        //$("#zona4 .txtChuva").html(chuv1 + "%");
                        //$("#zona5 .txtChuva").html(chuv2 + "%");
                        $("#zona3 .max").html(max2 + "º");
                        $("#zona3 .min").html(min2 + "º");
                    }
                });
            }
